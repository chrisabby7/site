<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timi Bina by Chrisma Abigail</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">

    <style>

        @font-face {
        font-family: 'ThickBrush';
        src: url('assets/timibina/ThickBrush.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        }

        .thickbrush {
            font-family: 'ThickBrush', 'Courier New', Courier, monospace;
            font-weight: normal;
            font-style: normal;
        }

        .kalam-light {
        font-family: "Kalam", cursive;
        font-weight: 300;
        font-style: normal;
        }

        .kalam-regular {
        font-family: "Kalam", cursive;
        font-weight: 400;
        font-style: normal;
        }

        .kalam-bold {
        font-family: "Kalam", cursive;
        font-weight: 700;
        font-style: normal;
        }
        
        .caveat {
        font-family: "Caveat", cursive;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
}

        /* --- CSS RESET & BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- PARALLAX BACKGROUND --- */
        /* IMPORTANT: Replace 'cover.jpg' with the path to your actual image.
           The parallax effect is created by background-attachment: fixed.
        */
        .parallax-bg {
            background-image: url('assets/timibina/TimiBina-Artwork.png'); /* REPLACE THIS IMAGE PATH */
            height: 100%;
            width: 100%;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: fixed;
            z-index: -2;
            top: 0;
            left: 0;
        }

        /* Adds a dark overlay so text is readable against the background */
        .parallax-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65); /* Adjust opacity (0.65) to make it darker/lighter */
            z-index: -1;
            backdrop-filter: blur(8px); /* Optional: adds a frosted glass blur effect */
        }

        /* --- MAIN CONTENT CONTAINER --- */
        .container {
            max-width: 480px;
            margin: 40px auto;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* --- TYPOGRAPHY --- */
        h1.artist-name {
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        h2.song-title {
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* --- COVER IMAGE --- */
        .cover-image {
            width: 100%;
            /* aspect-ratio forces the container to be square */
            aspect-ratio: 1 / 1; 
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .cover-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- AUDIO PLAYER styling style --- */
        .audio-wrapper {
            margin-bottom: 30px;
            width: 100%;
        }
        
        audio {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            outline: none;
        }
        /* Customizing audio player colors for webkit browsers */
        audio::-webkit-media-controls-panel { background-color: #f2f2f2; }
        audio::-webkit-media-controls-enclosure { border-radius: 20px; }


        /* --- LINK BUTTONS --- */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Space between buttons */
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.2s ease, background-color 0.2s;
            position: relative;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn i {
            font-size: 1.3rem;
            position: absolute;
            left: 20px;
        }

        /* Main YouTube Button Styling */
        .btn-main-youtube {
            background-color: #FF0000;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
        }
        .btn-main-youtube:hover { background-color: #cc0000; }

        /* Standard Service Button Styling */
        .btn-service {
            background-color: rgba(255, 255, 255, 0.95);
            color: #333;
            border: 1px solid rgba(0,0,0,0.1);
        }
        /* Brand Specific Hover Colors (Optional - remove if you want uniform hover) */
        .spotify-color:hover { color: #1DB954; }
        .apple-color:hover { color: #FA243C; }
        .amazon-color:hover { color: #FF9900; }
        .deezer-color:hover { color: #FEAA2D; }
        .tidal-color:hover { color: #000; }
        .soundcloud-color:hover { color: #ff5500; }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Responsive adjustments for smaller phones */
        @media (max-width: 400px) {
            h2.song-title { font-size: 1.8rem; }
            .btn { padding: 12px 15px; font-size: 0.9rem; }
            .btn i { left: 15px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="parallax-bg"></div>
    <div class="parallax-overlay"></div>

    <div class="container">
        
        <header>
            <h1 class="artist-name ">Chrisma Abigail</h1>
            <!--<h2 class="song-title caveat">Timi Bina <span class="kalam-light">(तिमी बिना)</span></h2>
        --><h2 class="song-title kalam-light">तिमी बिना <span class="caveat">(Timi Bina)</span></h2>
        
        </header>

        <div class="cover-image">
            <img src="assets/timibina/TimiBina-Artwork.png" alt="Timi Bina Cover Art">
        </div>

        <h2 class="song-title caveat">December 21st, 2025 <br>
            <span id="days-display"></span>
        </h2>

        <div class="audio-wrapper">
             <audio controls controlsList="nodownload">
                <source src="assets/timibina/TimiBina-Sample.wav" type="audio/wav">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="links-section">
            <a href="https://www.youtube.com/@ChrismaAbigail" id="youtube-link" class="btn btn-main-youtube" target="_blank">
                <i class="fab fa-youtube"></i>
                Subscribe YouTube
            </a>

            <a href="https://show.co/IBd6scY" class="btn btn-service spotify-color" target="_blank">
                <i class="fab fa-spotify"></i> Pre-save on Spotify
            </a>
            <!--
            <a href="#" class="btn btn-service apple-color" target="_blank">
                 <i class="fab fa-apple"></i> Pre-add on Apple Music
            </a>
             
             <a href="#" class="btn btn-service amazon-color" target="_blank">
                <i class="fab fa-amazon"></i> Pre-save on Amazon Music
            </a>

            <a href="#" class="btn btn-service deezer-color" target="_blank">
                <i class="fab fa-deezer"></i> Pre-save on Deezer
            </a>
            
            <a href="#" class="btn btn-service tidal-color" target="_blank">
                 <span style="position: absolute; left: 20px; font-weight: 900; font-size: 1.1rem;">T</span> Pre-save on Tidal
            </a>

            <a href="#" class="btn btn-service soundcloud-color" target="_blank">
                <i class="fab fa-soundcloud"></i> Pre-save on SoundCloud
            </a>
        </div>
        -->
        <footer>
            <p>© 2025 Chrisma Abigail</p>
        </footer>

    </div>

</body>
<script>
        // 1. Set the date we are counting down to
        const targetDate = new Date("December 21, 2025 00:00:00").getTime();

        // Get today's date and time
        const now = new Date().getTime();

        // Find the distance between now and the count down date
        const distance = targetDate - now;

        // Time calculations for days
        // (1000ms * 60s * 60m * 24h)
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));

        // Display the result in the element with id="days-display"
        if (days >= 1) {
            document.getElementById("days-display").innerText = days + " day to go";
        }
        else if (days === 1) {
            document.getElementById("days-display").innerText = "Coming tomorrow!";
        }
        else {
            document.getElementById("days-display").innerText = "";
            document.getElementById("youtube-link").innerText = "Watch on YouTube";
            clearInterval(x); // Stop the countdown
        }
        
        
    </script>
</html>
